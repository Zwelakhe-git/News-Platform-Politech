<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Сообщения — Politech News</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent:   #7c6ff7;
      --accent2:  #a78bfa;
      --danger:   #f87171;
      --success:  #34d399;
      --bg:       #080b14;
      --surface:  rgba(255,255,255,0.04);
      --border:   rgba(255,255,255,0.08);
      --text:     #f1f3f9;
      --muted:    #6b7280;
      --input-bg: rgba(255,255,255,0.05);
    }

    html, body { height: 100%; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Animated background ── */
    .bg-glow {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 0; overflow: hidden;
    }
    .bg-glow::before {
      content: '';
      position: absolute; top: -20%; left: -10%;
      width: 60%; height: 60%;
      background: radial-gradient(ellipse, rgba(124,111,247,0.13) 0%, transparent 70%);
      animation: drift1 12s ease-in-out infinite alternate;
    }
    .bg-glow::after {
      content: '';
      position: absolute; bottom: -10%; right: -5%;
      width: 50%; height: 50%;
      background: radial-gradient(ellipse, rgba(167,139,250,0.09) 0%, transparent 70%);
      animation: drift2 14s ease-in-out infinite alternate;
    }
    @keyframes drift1 { from { transform: translate(0,0) scale(1); } to { transform: translate(40px,30px) scale(1.1); } }
    @keyframes drift2 { from { transform: translate(0,0) scale(1); } to { transform: translate(-30px,-40px) scale(1.08); } }

    /* ── Top nav ── */
    .topnav {
      position: relative; z-index: 10;
      display: flex; align-items: center; gap: 16px;
      padding: 0 20px;
      height: 56px;
      border-bottom: 1px solid var(--border);
      background: rgba(8,11,20,0.85);
      backdrop-filter: blur(20px);
      flex-shrink: 0;
    }
    .brand {
      font-size: 18px; font-weight: 800; letter-spacing: -0.5px; color: #fff;
      text-decoration: none;
    }
    .brand em { font-style: normal; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .nav-title { font-size: 14px; font-weight: 600; color: var(--muted); margin-left: 4px; }
    .nav-spacer { flex: 1; }
    .nav-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700; color: #fff; cursor: pointer;
      flex-shrink: 0;
    }

    /* ── Main layout ── */
    .layout {
      position: relative; z-index: 1;
      display: flex; flex: 1; overflow: hidden;
    }

    /* ── Conversation list ── */
    .conv-panel {
      width: 320px; flex-shrink: 0;
      display: flex; flex-direction: column;
      border-right: 1px solid var(--border);
      background: rgba(255,255,255,0.015);
      overflow: hidden;
    }

    .conv-header {
      padding: 16px 16px 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .conv-header h2 { font-size: 15px; font-weight: 700; color: #fff; margin-bottom: 10px; }

    .search-wrap { position: relative; }
    .search-wrap input {
      width: 100%; background: var(--input-bg);
      border: 1px solid var(--border); border-radius: 10px;
      padding: 9px 12px 9px 36px;
      font-size: 13px; font-family: inherit; color: var(--text); outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .search-wrap input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(124,111,247,0.15); }
    .search-wrap input::placeholder { color: #374151; }
    .search-icon {
      position: absolute; left: 11px; top: 50%; transform: translateY(-50%);
      color: var(--muted);
    }
    .search-icon svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; }

    .conv-list { flex: 1; overflow-y: auto; padding: 8px 0; }
    .conv-list::-webkit-scrollbar { width: 4px; }
    .conv-list::-webkit-scrollbar-track { background: transparent; }
    .conv-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 4px; }

    .conv-item {
      display: flex; align-items: flex-start; gap: 11px;
      padding: 10px 14px;
      cursor: pointer;
      border-radius: 0;
      transition: background 0.15s;
      position: relative;
    }
    .conv-item:hover { background: rgba(255,255,255,0.04); }
    .conv-item.active { background: rgba(124,111,247,0.1); }
    .conv-item.active::before {
      content: '';
      position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
      background: linear-gradient(180deg, var(--accent), var(--accent2));
      border-radius: 0 2px 2px 0;
    }

    .conv-avatar {
      width: 42px; height: 42px; border-radius: 50%;
      flex-shrink: 0; display: flex; align-items: center; justify-content: center;
      font-size: 15px; font-weight: 700; color: #fff;
      position: relative;
    }
    .conv-avatar .unread-dot {
      position: absolute; top: 0; right: 0;
      width: 10px; height: 10px; border-radius: 50%;
      background: var(--accent); border: 2px solid var(--bg);
    }

    .conv-info { flex: 1; min-width: 0; }
    .conv-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 3px; }
    .conv-name { font-size: 13px; font-weight: 600; color: #e5e7eb; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .conv-time { font-size: 11px; color: var(--muted); flex-shrink: 0; margin-left: 6px; }
    .conv-preview { font-size: 12px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .conv-preview.unread { color: #9ca3af; font-weight: 500; }
    .conv-badge {
      width: 18px; height: 18px; border-radius: 50%;
      background: var(--accent); color: #fff;
      font-size: 10px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; margin-top: 2px;
    }

    .new-conv-btn {
      margin: 10px 14px;
      padding: 10px;
      border: 1px dashed rgba(124,111,247,0.35);
      border-radius: 10px;
      background: rgba(124,111,247,0.05);
      color: var(--accent2);
      font-size: 13px; font-weight: 600; font-family: inherit;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
      display: flex; align-items: center; justify-content: center; gap: 6px;
      flex-shrink: 0;
    }
    .new-conv-btn:hover { background: rgba(124,111,247,0.1); border-color: var(--accent); }

    /* ── Message panel ── */
    .msg-panel {
      flex: 1; display: flex; flex-direction: column; overflow: hidden;
    }

    .msg-header {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      background: rgba(255,255,255,0.015);
      flex-shrink: 0;
    }
    .msg-header-avatar {
      width: 38px; height: 38px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 700; color: #fff; flex-shrink: 0;
    }
    .msg-header-info { flex: 1; }
    .msg-header-name { font-size: 14px; font-weight: 700; color: #fff; }
    .msg-header-role { font-size: 11px; color: var(--muted); margin-top: 1px; }
    .msg-header-actions { display: flex; gap: 6px; }
    .icon-btn {
      width: 34px; height: 34px; border-radius: 8px;
      border: 1px solid var(--border); background: var(--input-bg);
      color: var(--muted); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, color 0.15s;
    }
    .icon-btn:hover { background: rgba(255,255,255,0.08); color: var(--text); }
    .icon-btn svg { width: 15px; height: 15px; stroke: currentColor; fill: none; stroke-width: 1.8; }

    /* ── Messages ── */
    .msg-body {
      flex: 1; overflow-y: auto;
      padding: 20px;
      display: flex; flex-direction: column; gap: 16px;
    }
    .msg-body::-webkit-scrollbar { width: 4px; }
    .msg-body::-webkit-scrollbar-track { background: transparent; }
    .msg-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 4px; }

    .date-divider {
      display: flex; align-items: center; gap: 10px;
      margin: 4px 0;
    }
    .date-divider span { font-size: 11px; color: #374151; white-space: nowrap; }
    .date-divider::before, .date-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    .msg-row {
      display: flex; gap: 10px; align-items: flex-end;
    }
    .msg-row.mine { flex-direction: row-reverse; }

    .msg-bubble-avatar {
      width: 28px; height: 28px; border-radius: 50%;
      flex-shrink: 0; display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; color: #fff;
    }

    .msg-bubble {
      max-width: 62%;
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 14px; line-height: 1.55;
      position: relative;
    }
    .msg-row:not(.mine) .msg-bubble {
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
      color: #e5e7eb;
    }
    .msg-row.mine .msg-bubble {
      background: linear-gradient(135deg, var(--accent), #6d5ce7);
      border-bottom-right-radius: 4px;
      color: #fff;
      box-shadow: 0 4px 16px rgba(124,111,247,0.25);
    }
    .msg-time {
      font-size: 10px; margin-top: 4px; display: block;
      color: rgba(255,255,255,0.45);
    }
    .msg-row:not(.mine) .msg-time { color: var(--muted); }

    /* ── Empty state ── */
    .empty-state {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 12px;
      color: var(--muted);
    }
    .empty-state .es-icon { font-size: 48px; opacity: 0.4; }
    .empty-state h3 { font-size: 16px; font-weight: 600; color: #4b5563; }
    .empty-state p { font-size: 13px; color: #374151; text-align: center; max-width: 260px; line-height: 1.5; }

    /* ── Compose area ── */
    .compose {
      padding: 14px 20px;
      border-top: 1px solid var(--border);
      background: rgba(255,255,255,0.015);
      flex-shrink: 0;
    }
    .compose-inner {
      display: flex; gap: 10px; align-items: flex-end;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 10px 12px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .compose-inner:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(124,111,247,0.12);
    }
    .compose-input {
      flex: 1; background: none; border: none; outline: none;
      font-size: 14px; font-family: inherit; color: var(--text);
      resize: none; max-height: 120px; min-height: 22px;
      line-height: 1.5;
    }
    .compose-input::placeholder { color: #374151; }
    .compose-actions { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }
    .attach-btn {
      background: none; border: none; color: var(--muted); cursor: pointer;
      padding: 4px; border-radius: 6px;
      transition: color 0.15s;
      display: flex; align-items: center;
    }
    .attach-btn:hover { color: var(--accent2); }
    .attach-btn svg { width: 17px; height: 17px; stroke: currentColor; fill: none; stroke-width: 1.8; }
    .send-btn {
      width: 34px; height: 34px; border-radius: 10px; border: none;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: opacity 0.2s, transform 0.15s;
      box-shadow: 0 4px 12px rgba(124,111,247,0.3);
      flex-shrink: 0;
    }
    .send-btn:hover { opacity: 0.88; }
    .send-btn:active { transform: scale(0.93); }
    .send-btn svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; }

    /* ── New conversation modal ── */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 100;
      background: rgba(0,0,0,0.6); backdrop-filter: blur(6px);
      display: none; align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #0f1320;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      width: 100%; max-width: 400px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.5);
    }
    .modal h3 { font-size: 16px; font-weight: 700; color: #fff; margin-bottom: 16px; }
    .modal label { display: block; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); margin-bottom: 6px; }
    .modal input, .modal textarea {
      width: 100%;
      background: var(--input-bg); border: 1px solid var(--border);
      border-radius: 10px; padding: 11px 14px;
      font-size: 14px; font-family: inherit; color: var(--text); outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      margin-bottom: 14px;
    }
    .modal input:focus, .modal textarea:focus {
      border-color: var(--accent); box-shadow: 0 0 0 3px rgba(124,111,247,0.15);
    }
    .modal input::placeholder, .modal textarea::placeholder { color: #374151; }
    .modal textarea { resize: none; height: 90px; }
    .modal-actions { display: flex; gap: 10px; margin-top: 4px; }
    .btn-cancel {
      flex: 1; padding: 11px; border-radius: 10px;
      border: 1px solid var(--border); background: var(--input-bg);
      color: var(--muted); font-size: 14px; font-weight: 600; font-family: inherit;
      cursor: pointer; transition: background 0.15s;
    }
    .btn-cancel:hover { background: rgba(255,255,255,0.07); color: var(--text); }
    .btn-send-modal {
      flex: 1; padding: 11px; border-radius: 10px; border: none;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff; font-size: 14px; font-weight: 700; font-family: inherit;
      cursor: pointer; transition: opacity 0.2s;
      box-shadow: 0 4px 16px rgba(124,111,247,0.3);
    }
    .btn-send-modal:hover { opacity: 0.88; }

    /* scrollbar for body */
    .msg-body::-webkit-scrollbar { width: 4px; }
  </style>
</head>
<body>

<div class="bg-glow"></div>

<!-- Top nav -->
<nav class="topnav">
  <a href="#" class="brand">Politech<em>News</em></a>
  <span class="nav-title">/ Сообщения</span>
  <div class="nav-spacer"></div>
  <div class="nav-avatar" title="Ваш профиль">М</div>
</nav>

<div class="layout">

  <!-- ── Conversation list ── -->
  <aside class="conv-panel">
    <div class="conv-header">
      <h2>Входящие</h2>
      <div class="search-wrap">
        <span class="search-icon">
          <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </span>
        <input type="text" id="searchInput" placeholder="Поиск сообщений..." oninput="filterConvs(this.value)" />
      </div>
    </div>

    <div class="conv-list" id="convList">
      <!-- populated by JS -->
    </div>

    <button class="new-conv-btn" onclick="openModal()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Написать автору
    </button>
  </aside>

  <!-- ── Message panel ── -->
  <main class="msg-panel" id="msgPanel">
    <div class="empty-state" id="emptyState">
      <div class="es-icon">💬</div>
      <h3>Нет выбранного диалога</h3>
      <p>Выберите переписку слева или начните новый диалог с автором</p>
    </div>
  </main>

</div>

<!-- ── New conversation modal ── -->
<div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <h3>Написать автору</h3>
    <label>Имя автора или email</label>
    <input type="text" id="newRecipient" placeholder="Например: Анна Смирнова" />
    <label>Сообщение</label>
    <textarea id="newMessage" placeholder="Введите ваше сообщение..."></textarea>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Отмена</button>
      <button class="btn-send-modal" onclick="sendNewConv()">Отправить</button>
    </div>
  </div>
</div>

<script>
/* ── Demo data ── */
const ME = { name: 'Мерт', initials: 'М' };

const conversations = [
  /*{
    id: 1,

    role: 'Автор',

    color: '#7c6ff7',

      { from: 'them', text: 'Очень рада слышать! Готовлю продолжение на следующей неделе.', time: '10:18', date: 'Сегодня' },
      { from: 'me',   text: 'С нетерпением жду! Есть вопрос по теме — можно уточнить?', time: '10:20', date: 'Сегодня' },
      { from: 'them', text: 'Конечно, спрашивайте!', time: '10:21', date: 'Сегодня' },
      { from: 'them', text: 'Буду рада помочь 😊', time: '10:21', date: 'Сегодня' },
    ]
  },
  {
    id: 2,
    name: 'Дмитрий Козлов',
    role: 'Автор',
    initials: 'ДК',
    color: '#10b981',
    unread: 0,
    messages: [
      { from: 'me',   text: 'Дмитрий, читал вашу статью про блокчейн — очень круто!', time: 'Вчера', date: 'Вчера' },
      { from: 'them', text: 'Спасибо большое! Если есть вопросы — задавайте.', time: 'Вчера', date: 'Вчера' },
      { from: 'me',   text: 'Обязательно воспользуюсь, спасибо!', time: 'Вчера', date: 'Вчера' },
    ]
  },
  {
    id: 3,
    name: 'Мария Иванова',
    role: 'Автор',
    initials: 'МИ',
    color: '#f59e0b',
    unread: 1,
    messages: [
      { from: 'them', text: 'Привет! Видела, что вы подписались на мои материалы.', time: '14:05', date: 'Сегодня' },
      { from: 'me',   text: 'Да, очень нравятся ваши репортажи!', time: '14:10', date: 'Сегодня' },
      { from: 'them', text: 'Скоро выйдет большой материал про политику в СПб 🔥', time: '14:33', date: 'Сегодня' },
    ]
  },
  {
    id: 4,
    name: 'Иван Петров',
    role: 'Автор',
    initials: 'ИП',
    color: '#ef4444',
    unread: 0,
    messages: [
      { from: 'me',   text: 'Иван, можете порекомендовать источники по теме экономики?', time: '2 дня назад', date: '2 дня назад' },
      { from: 'them', text: 'Конечно! Посмотрите РБК и Коммерсантъ — там хорошая аналитика.', time: '2 дня назад', date: '2 дня назад' },
    ]
  },*/
];

let activeId = null;

/* ── Render conversation list ── */
function renderConvList(list) {
  const el = document.getElementById('convList');
  el.innerHTML = '';
  list.forEach(conv => {
    const last = conv.messages[conv.messages.length - 1];
    const preview = (last.from === 'me' ? 'Вы: ' : '') + last.text;
    el.innerHTML += `
      <div class="conv-item ${activeId === conv.id ? 'active' : ''}" onclick="openConv(${conv.id})">
        <div class="conv-avatar" style="background: linear-gradient(135deg, ${conv.color}, ${conv.color}99)">
          ${conv.initials}
          ${conv.unread ? '<span class="unread-dot"></span>' : ''}
        </div>
        <div class="conv-info">
          <div class="conv-top">
            <span class="conv-name">${conv.name}</span>
            <span class="conv-time">${last.time}</span>
          </div>
          <div style="display:flex;align-items:center;justify-content:space-between;gap:6px">
            <div class="conv-preview ${conv.unread ? 'unread' : ''}">${preview}</div>
            ${conv.unread ? `<div class="conv-badge">${conv.unread}</div>` : ''}
          </div>
        </div>
      </div>`;
  });
}

/* ── Open conversation ── */
function openConv(id) {
  activeId = id;
  const conv = conversations.find(c => c.id === id);
  conv.unread = 0;
  renderConvList(conversations);

  const panel = document.getElementById('msgPanel');
  let dateShown = '';
  let bubbles = '';
  conv.messages.forEach(msg => {
    if (msg.date !== dateShown) {
      bubbles += `<div class="date-divider"><span>${msg.date}</span></div>`;
      dateShown = msg.date;
    }
    const isMine = msg.from === 'me';
    const initials = isMine ? ME.initials : conv.initials;
    const color = isMine ? 'var(--accent)' : conv.color;
    bubbles += `
      <div class="msg-row ${isMine ? 'mine' : ''}">
        <div class="msg-bubble-avatar" style="background:linear-gradient(135deg,${color},${color}99)">${initials}</div>
        <div class="msg-bubble">
          ${msg.text}
          <span class="msg-time">${msg.time}</span>
        </div>
      </div>`;
  });

  panel.innerHTML = `
    <div class="msg-header">
      <div class="msg-header-avatar" style="background:linear-gradient(135deg,${conv.color},${conv.color}99)">${conv.initials}</div>
      <div class="msg-header-info">
        <div class="msg-header-name">${conv.name}</div>
        <div class="msg-header-role">${conv.role}</div>
      </div>
      <div class="msg-header-actions">
        <button class="icon-btn" title="Поиск в переписке">
          <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </button>
        <button class="icon-btn" title="Профиль автора">
          <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </button>
      </div>
    </div>
    <div class="msg-body" id="msgBody">${bubbles}</div>
    <div class="compose">
      <div class="compose-inner">
        <textarea class="compose-input" id="composeInput" rows="1" placeholder="Написать сообщение..."
          onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <div class="compose-actions">
          <button class="attach-btn" title="Прикрепить файл">
            <svg viewBox="0 0 24 24"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
          </button>
          <button class="send-btn" onclick="sendMessage()" title="Отправить">
            <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
      </div>
    </div>`;

  scrollToBottom();
}

function scrollToBottom() {
  const body = document.getElementById('msgBody');
  if (body) body.scrollTop = body.scrollHeight;
}

/* ── Send message ── */
function sendMessage() {
  const input = document.getElementById('composeInput');
  if (!input) return;
  const text = input.value.trim();
  if (!text) return;

  const conv = conversations.find(c => c.id === activeId);
  const now = new Date();
  const time = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
  conv.messages.push({ from: 'me', text, time, date: 'Сегодня' });

  input.value = '';
  input.style.height = '';
  openConv(activeId);
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

/* ── Search ── */
function filterConvs(q) {
  const filtered = q
    ? conversations.filter(c => c.name.toLowerCase().includes(q.toLowerCase()) ||
        c.messages.some(m => m.text.toLowerCase().includes(q.toLowerCase())))
    : conversations;
  renderConvList(filtered);
}

/* ── New conversation modal ── */
function openModal() {
  document.getElementById('modalOverlay').classList.add('open');
  document.getElementById('newRecipient').focus();
}
function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.getElementById('newRecipient').value = '';
  document.getElementById('newMessage').value = '';
}
function handleOverlayClick(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}
function sendNewConv() {
  const recipient = document.getElementById('newRecipient').value.trim();
  const text = document.getElementById('newMessage').value.trim();
  if (!recipient || !text) return;

  const colors = ['#7c6ff7','#10b981','#f59e0b','#ef4444','#3b82f6','#ec4899'];
  const color = colors[Math.floor(Math.random() * colors.length)];
  const initials = recipient.split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();
  const now = new Date();
  const time = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');

  const newConv = {
    id: Date.now(),
    name: recipient,
    role: 'Автор',
    initials,
    color,
    unread: 0,
    messages: [{ from: 'me', text, time, date: 'Сегодня' }]
  };
  conversations.unshift(newConv);
  closeModal();
  renderConvList(conversations);
  openConv(newConv.id);
}

/* ── Init ── */
renderConvList(conversations);
</script>
</body>
</html>
